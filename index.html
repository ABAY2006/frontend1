<!DOCTYPE html>
<html>
<head>
<title>MedPlant AI</title>
<link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="container">

<h1>🌿 MedPlant AI</h1>

<div id="auth">

<h2>Signup</h2>
<input id="su_user" placeholder="Username">
<input id="su_pass" type="password" placeholder="Password">
<button onclick="signup()">Signup</button>

<h2>Login</h2>
<input id="li_user" placeholder="Username">
<input id="li_pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>

</div>

<div id="app" style="display:none">

<h2>Upload Plant Image</h2>

<input type="file" id="plantImage">

<button onclick="upload()">Predict Plant</button>

<div id="result">

<h3 id="plantName"></h3>
<p id="desc"></p>
<p id="med"></p>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
