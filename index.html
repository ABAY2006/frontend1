<!DOCTYPE html>
<html>

<head>
<title>Med Plant</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Medicinal Plant Identifier</h1>

<div class="box">

<h2>Signup</h2>
<input id="su_user" placeholder="Username">
<input id="su_pass" type="password" placeholder="Password">
<button onclick="signup()">Signup</button>

<h2>Login</h2>
<input id="li_user" placeholder="Username">
<input id="li_pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>

</div>

<hr>

<div class="box">

<h2>Upload Plant Image</h2>

<input type="file" id="plantImage">
<button onclick="identifyPlant()">Identify Plant</button>

<div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
